<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Team Task Manager</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">
      Team Task Manager
    </h1>

    <!-- REGISTER SECTION -->

    <div class="card p-4 mb-4">

      <h3>Register</h3>

      <input
        type="text"
        id="registerName"
        class="form-control mb-2"
        placeholder="Name"
      />

      <input
        type="email"
        id="registerEmail"
        class="form-control mb-2"
        placeholder="Email"
      />

      <input
        type="password"
        id="registerPassword"
        class="form-control mb-2"
        placeholder="Password"
      />

      <select
        id="registerRole"
        class="form-control mb-3"
      >
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>

      <button
        class="btn btn-primary"
        onclick="registerUser()"
      >
        Register
      </button>

    </div>


    <!-- LOGIN SECTION -->

    <div class="card p-4 mb-4">

      <h3>Login</h3>

      <input
        type="email"
        id="loginEmail"
        class="form-control mb-2"
        placeholder="Email"
      />

      <input
        type="password"
        id="loginPassword"
        class="form-control mb-3"
        placeholder="Password"
      />

      <button
        class="btn btn-success"
        onclick="loginUser()"
      >
        Login
      </button>

    </div>


    <!-- CREATE PROJECT -->

    <div class="card p-4 mb-4">

      <h3>Create Project</h3>

      <input
        type="text"
        id="projectName"
        class="form-control mb-2"
        placeholder="Project Name"
      />

      <textarea
        id="projectDescription"
        class="form-control mb-3"
        placeholder="Project Description"
      ></textarea>

      <button
        class="btn btn-warning"
        onclick="createProject()"
      >
        Create Project
      </button>

    </div>


    <!-- PROJECT LIST -->

    <div class="card p-4 mb-4">

      <h3>Projects</h3>

      <ul
        id="projectList"
        class="list-group"
      ></ul>

    </div>


    <!-- CREATE TASK -->

    <div class="card p-4 mb-4">

      <h3>Create Task</h3>

      <input
        type="text"
        id="taskTitle"
        class="form-control mb-2"
        placeholder="Task Title"
      />

      <textarea
        id="taskDescription"
        class="form-control mb-2"
        placeholder="Task Description"
      ></textarea>

      <input
        type="text"
        id="taskProjectId"
        class="form-control mb-2"
        placeholder="Project ID"
      />

      <input
        type="date"
        id="taskDueDate"
        class="form-control mb-3"
      />

      <button
        class="btn btn-danger"
        onclick="createTask()"
      >
        Create Task
      </button>

    </div>


    <!-- TASK LIST -->

    <div class="card p-4 mb-4">

      <h3>Tasks</h3>

      <ul
        id="taskList"
        class="list-group"
      ></ul>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
